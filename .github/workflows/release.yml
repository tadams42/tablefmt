name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Package
        run: |
          strip target/x86_64-unknown-linux-musl/release/tablefmt
          tar czf tablefmt-x86_64-unknown-linux-musl.tar.gz -C target/x86_64-unknown-linux-musl/release tablefmt

      - name: Extract release notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${TAG}$" | tail -1)

          BODY=$(awk "
            /^## ${TAG} / { found=1; next }
            found && /^## / { exit }
            found { print }
          " CHANGELOG.md)

          # Trim leading and trailing blank lines
          BODY=$(printf '%s' "${BODY}" | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')

          printf '%s\n' "${BODY}" > release_body.md

          if [ -n "${PREV_TAG}" ]; then
            printf '\n**Full Changelog**: https://github.com/tadams42/tablefmt/compare/%s...%s\n' "${PREV_TAG}" "${TAG}" >> release_body.md
          fi

      - uses: softprops/action-gh-release@v3
        with:
          files: tablefmt-x86_64-unknown-linux-musl.tar.gz
          body_path: release_body.md
