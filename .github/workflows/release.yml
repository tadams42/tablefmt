name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "Linux x86_64",   os: ubuntu-latest,    target: x86_64-unknown-linux-musl,  archive_ext: tar.gz }
          - { name: "Linux aarch64",  os: ubuntu-24.04-arm, target: aarch64-unknown-linux-musl, archive_ext: tar.gz }
          - { name: "macOS x86_64",   os: macos-15-intel,   target: x86_64-apple-darwin,        archive_ext: tar.gz }
          - { name: "macOS aarch64",  os: macos-latest,     target: aarch64-apple-darwin,       archive_ext: tar.gz }
          - { name: "Windows x86_64", os: windows-latest,   target: x86_64-pc-windows-msvc,     archive_ext: zip   }

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          strip target/${{ matrix.target }}/release/tablefmt
          tar czf tablefmt-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release tablefmt

      - name: Package (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/tablefmt.exe" `
            -DestinationPath "tablefmt-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: tablefmt-${{ matrix.target }}
          path: tablefmt-${{ matrix.target }}.${{ matrix.archive_ext }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract release notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${TAG}$" | tail -1)

          BODY=$(awk "
            /^## ${TAG} / { found=1; next }
            found && /^## / { exit }
            found { print }
          " CHANGELOG.md)

          # Trim leading and trailing blank lines
          BODY=$(printf '%s' "${BODY}" | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')

          printf '%s\n' "${BODY}" > release_body.md

          if [ -n "${PREV_TAG}" ]; then
            printf '\n**Full Changelog**: https://github.com/tadams42/tablefmt/compare/%s...%s\n' "${PREV_TAG}" "${TAG}" >> release_body.md
          fi

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          body_path: release_body.md
